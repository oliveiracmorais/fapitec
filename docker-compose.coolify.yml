name: fapitec

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fapitec
      POSTGRES_USER: fapitec
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/db/init-casdoor-db.sql:/docker-entrypoint-initdb.d/02-init-casdoor-db.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fapitec"]
      interval: 5s
      timeout: 5s
      retries: 5

  casdoor:
    image: casbin/casdoor:v3.92.0
    pull_policy: always
    environment:
      driverName: postgres
      dataSourceName: "host=postgres port=5432 user=fapitec password=${DB_PASSWORD} dbname=casdoor sslmode=disable"
      dbName: casdoor
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_WEBROOT: /mail/
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-internal}
      CASDOOR_ENDPOINT: ${CASDOOR_ENDPOINT}
      CASDOOR_CLIENT_ID: ${CASDOOR_CLIENT_ID}
      CASDOOR_CLIENT_SECRET: ${CASDOOR_CLIENT_SECRET}
      CASDOOR_CERTIFICATE: ${CASDOOR_CERTIFICATE}
      CASDOOR_ORGANIZATION_NAME: ${CASDOOR_ORGANIZATION_NAME}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: noreply@fapitec.se.gov.br
      FRONTEND_URL: https://fapitec.duckdns.org
    volumes:
      - ./casdoor-cert.pem:/app/casdoor-cert.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.homolog
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
