name: fapitec

services:
  dozzle:
    image: amir20/dozzle:v8
    container_name: fapitec-dozzle
    command: --base /logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:9999:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: fapitec-postgres
    environment:
      POSTGRES_DB: fapitec
      POSTGRES_USER: fapitec
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fapitec"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fapitec-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: fapitec-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:8080
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
    name: fapitec_postgres_data
    external: true
