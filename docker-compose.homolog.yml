name: fapitec

services:
  dozzle:
    image: amir20/dozzle:v8
    container_name: fapitec-dozzle
    command: --base /logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:9999:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: fapitec-postgres
    environment:
      POSTGRES_DB: fapitec
      POSTGRES_USER: fapitec
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/db/init-casdoor-db.sql:/docker-entrypoint-initdb.d/02-init-casdoor-db.sql
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fapitec"]
      interval: 5s
      timeout: 5s
      retries: 5

  casdoor:
    image: casbin/casdoor:latest
    container_name: fapitec-casdoor
    environment:
      driverName: postgres
      dataSourceName: "host=postgres port=5432 user=fapitec password=${DB_PASSWORD} dbname=casdoor sslmode=disable"
      dbName: casdoor
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: fapitec-mailpit
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
      MP_WEBROOT: /mail/
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - app_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fapitec-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api/nginx/nginx.homolog.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - app_network
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fapitec-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-internal}
      CASDOOR_ENDPOINT: ${CASDOOR_ENDPOINT}
      CASDOOR_CLIENT_ID: ${CASDOOR_CLIENT_ID}
      CASDOOR_CLIENT_SECRET: ${CASDOOR_CLIENT_SECRET}
      CASDOOR_CERTIFICATE: ${CASDOOR_CERTIFICATE}
      CASDOOR_ORGANIZATION_NAME: ${CASDOOR_ORGANIZATION_NAME}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: noreply@fapitec.se.gov.br
      FRONTEND_URL: https://fapitec.duckdns.org
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - app_network
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.homolog
    container_name: fapitec-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:8080
    depends_on:
      - api
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
    name: fapitec_postgres_data
    external: true
