# Configuração para subdomínio auth.fapitec.duckdns.org
# Adicionar ao /etc/nginx/sites-available/fapitec-casdoor na VM Oracle
# (junto com o nginx existente que já faz proxy de compusa.duckdns.org)

server {
    listen 80;
    server_name auth.fapitec.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name auth.fapitec.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/compusa.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compusa.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
