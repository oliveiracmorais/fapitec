# Configuração para subdomínio auth.fapitec.duckdns.org
# Usar com setup-casdoor-subdomain.sh na VM Oracle Cloud.
#
# Certificado SSL: pode ser wildcard (*.fapitec.duckdns.org via DNS-01 challenge)
# ou um certificado SAN que cubra ambos fapitec.duckdns.org e auth.fapitec.duckdns.org.
# O script de setup tentará emitir via certbot standalone na primeira execução.

server {
    listen 80;
    server_name auth.fapitec.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name auth.fapitec.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/auth.fapitec.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.fapitec.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
